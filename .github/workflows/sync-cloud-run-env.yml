name: Sync Cloud Run Env

on:
  push:
    branches: [ main ]

env:
  GCP_PROJECT_ID: charlesschwabquant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/401309731911/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: schwab-platform-deploy@charlesschwabquant.iam.gserviceaccount.com

jobs:
  sync-cloud-run-env:
    name: Sync Cloud Run Env
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      ENABLE_GITHUB_ENV_SYNC: ${{ vars.ENABLE_GITHUB_ENV_SYNC }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      TELEGRAM_TOKEN_SECRET_NAME: ${{ vars.TELEGRAM_TOKEN_SECRET_NAME }}
      SCHWAB_API_KEY_SECRET_NAME: ${{ vars.SCHWAB_API_KEY_SECRET_NAME }}
      SCHWAB_APP_SECRET_SECRET_NAME: ${{ vars.SCHWAB_APP_SECRET_SECRET_NAME }}
      STRATEGY_PROFILE: ${{ vars.STRATEGY_PROFILE || 'hybrid_growth_income' }}
      INCOME_THRESHOLD_USD: ${{ vars.INCOME_THRESHOLD_USD }}
      QQQI_INCOME_RATIO: ${{ vars.QQQI_INCOME_RATIO }}
      EXECUTION_REPORT_GCS_URI: ${{ vars.EXECUTION_REPORT_GCS_URI }}
      GLOBAL_TELEGRAM_CHAT_ID: ${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}
      NOTIFY_LANG: ${{ vars.NOTIFY_LANG }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      SCHWAB_API_KEY: ${{ secrets.SCHWAB_API_KEY }}
      SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
    steps:
      - name: Check whether env sync is configured
        id: config
        run: |
          set -euo pipefail

          if [ "${ENABLE_GITHUB_ENV_SYNC:-}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloud Run env sync because ENABLE_GITHUB_ENV_SYNC is not set to true." >&2
            exit 0
          fi

          required_vars=(
            CLOUD_RUN_REGION
            CLOUD_RUN_SERVICE
            GLOBAL_TELEGRAM_CHAT_ID
            NOTIFY_LANG
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("${var_name}")
            fi
          done

          if [ -z "${TELEGRAM_TOKEN_SECRET_NAME:-}" ] && [ -z "${TELEGRAM_TOKEN:-}" ]; then
            missing_vars+=("TELEGRAM_TOKEN_SECRET_NAME or TELEGRAM_TOKEN")
          fi

          if [ -z "${SCHWAB_API_KEY_SECRET_NAME:-}" ] && [ -z "${SCHWAB_API_KEY:-}" ]; then
            missing_vars+=("SCHWAB_API_KEY_SECRET_NAME or SCHWAB_API_KEY")
          fi

          if [ -z "${SCHWAB_APP_SECRET_SECRET_NAME:-}" ] && [ -z "${SCHWAB_APP_SECRET:-}" ]; then
            missing_vars+=("SCHWAB_APP_SECRET_SECRET_NAME or SCHWAB_APP_SECRET")
          fi

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloud Run env sync is enabled, but these values are missing:" >&2
            printf '  - %s\n' "${missing_vars[@]}" >&2
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Sync Cloud Run environment
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          env_pairs=(
            "GLOBAL_TELEGRAM_CHAT_ID=${GLOBAL_TELEGRAM_CHAT_ID}"
            "NOTIFY_LANG=${NOTIFY_LANG}"
            "STRATEGY_PROFILE=${STRATEGY_PROFILE}"
          )
          secret_pairs=()
          remove_env_vars=(
            "TELEGRAM_CHAT_ID"
          )
          remove_secret_vars=()

          if [ -n "${TELEGRAM_TOKEN_SECRET_NAME:-}" ]; then
            secret_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN_SECRET_NAME}:latest")
            remove_env_vars+=("TELEGRAM_TOKEN")
          else
            env_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN}")
            remove_secret_vars+=("TELEGRAM_TOKEN")
          fi

          if [ -n "${SCHWAB_API_KEY_SECRET_NAME:-}" ]; then
            secret_pairs+=("SCHWAB_API_KEY=${SCHWAB_API_KEY_SECRET_NAME}:latest")
            remove_env_vars+=("SCHWAB_API_KEY")
          else
            env_pairs+=("SCHWAB_API_KEY=${SCHWAB_API_KEY}")
            remove_secret_vars+=("SCHWAB_API_KEY")
          fi

          if [ -n "${SCHWAB_APP_SECRET_SECRET_NAME:-}" ]; then
            secret_pairs+=("SCHWAB_APP_SECRET=${SCHWAB_APP_SECRET_SECRET_NAME}:latest")
            remove_env_vars+=("SCHWAB_APP_SECRET")
          else
            env_pairs+=("SCHWAB_APP_SECRET=${SCHWAB_APP_SECRET}")
            remove_secret_vars+=("SCHWAB_APP_SECRET")
          fi

          if [ -n "${INCOME_THRESHOLD_USD:-}" ]; then
            env_pairs+=("INCOME_THRESHOLD_USD=${INCOME_THRESHOLD_USD}")
          fi

          if [ -n "${QQQI_INCOME_RATIO:-}" ]; then
            env_pairs+=("QQQI_INCOME_RATIO=${QQQI_INCOME_RATIO}")
          fi

          if [ -n "${EXECUTION_REPORT_GCS_URI:-}" ]; then
            env_pairs+=("EXECUTION_REPORT_GCS_URI=${EXECUTION_REPORT_GCS_URI}")
          else
            remove_env_vars+=("EXECUTION_REPORT_GCS_URI")
          fi

          if [ -n "${GOOGLE_CLOUD_PROJECT:-}" ]; then
            env_pairs+=("GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}")
          fi

          gcloud_args=(
            run services update "${CLOUD_RUN_SERVICE}"
            --region "${CLOUD_RUN_REGION}"
            --remove-env-vars "$(IFS=,; echo "${remove_env_vars[*]}")"
            --update-env-vars "$(IFS=,; echo "${env_pairs[*]}")"
          )

          if [ "${#remove_secret_vars[@]}" -gt 0 ]; then
            gcloud_args+=(--remove-secrets "$(IFS=,; echo "${remove_secret_vars[*]}")")
          fi

          if [ "${#secret_pairs[@]}" -gt 0 ]; then
            gcloud_args+=(--update-secrets "$(IFS=,; echo "${secret_pairs[*]}")")
          fi

          gcloud "${gcloud_args[@]}"
